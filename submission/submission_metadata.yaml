  - hypercomplex embedding

abstract: |
  Semantic networks encode relationships between concepts through patterns of
  word association. Whether these networks exhibit hyperbolic geometry — and
  why — remains open. We present an empirically supported two-parameter model
  combining a curvature sign change in random graphs with analysis of 11
  semantic networks across 7 languages and one clinical dataset. Using exact
  linear programming to compute Ollivier-Ricci curvature, we find that the
  density parameter eta = <k>^2/N undergoes a sign change at eta_c(N) =
  3.75 - 14.62/sqrt(N) (R^2 = 0.995). A second parameter, clustering C,
  separates hyperbolic (C > 0.10) from Euclidean (C < 0.02) regimes. Dutch
  SWOW (eta = 7.56) is the first real network to cross into spherical
  geometry. Sphere-embedded ORC across the Cayley-Dickson tower eliminates
  negative curvature for all 11 networks by d=8. A Lean 4 formalization
  (25 modules, 0 sorry in 7 core modules) provides machine-checked proofs.

