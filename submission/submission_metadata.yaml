abstract: |
  Semantic networks, representing word associations, exhibit complex topological 
  properties. We tested whether semantic networks possess hyperbolic geometry 
  (negative curvature) across four languages. Using Ollivier-Ricci curvature 
  on SWOW networks (N=500 nodes each), we compared observed values to structural 
  null models (configuration model, M=1000; triadic-rewire, M=1000 for 2 languages). 
  Configuration nulls revealed highly significant deviations for Spanish, English, 
  and Dutch (Δκ = 0.020-0.029, p_MC < 0.001, |Cliff's δ| = 1.00), while Chinese 
  showed non-significant positive deviation. Triadic-rewire nulls confirmed 
  robustness. Degree distributions were broad-scale/lognormal, not strict scale-free, 
  yet hyperbolic geometry persisted. Results remained robust across parameter 
  variations. Semantic networks consistently exhibit hyperbolic geometry across 
  three of four languages, ruling out hub effects and validating hyperbolic 
  embedding approaches in NLP.

